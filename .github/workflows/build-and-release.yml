name: Build And Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION="$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Move version tag to current commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.version.outputs.tag_name }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.version.outputs.tag_name }}" --force

  build-tauri:
    name: Build ${{ matrix.platform_name }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux
            runner: ubuntu-22.04
            args: --bundles appimage,deb,rpm
          - platform_name: Windows
            runner: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - platform_name: macOS
            runner: macos-latest
            args: --target universal-apple-darwin --bundles dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.runner == 'macos-latest' &&
            'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target # adjust if your Tauri dir differs

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            wget \
            file \
            curl \
            libxdo-dev

      - name: Install frontend dependencies (root)
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies (QxpClient)
        run: bun install --frozen-lockfile
        working-directory: QxpClient

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: LQXP Client v__VERSION__
          releaseBody: |
            Build automatique GitHub Actions pour la version __VERSION__.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          tauriScript: bunx tauri

  build-android:
    name: Build Android APK
    needs: prepare-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build Android APK
        shell: bash
        run: |
          nix develop --command bash -lc '
            set -euo pipefail
            bun install
            (cd QxpClient && bun install)
            lqxp-rustup-android-targets
            bun tauri android build
          '

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lqxp-client-android
          if-no-files-found: error
          path: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

      - name: Upload Android release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: LQXP Client v${{ needs.prepare-release.outputs.app_version }}
          body: |
            Build automatique GitHub Actions pour la version ${{ needs.prepare-release.outputs.app_version }}.
          generate_release_notes: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
