name: Build And Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      ios_export_method:
        description: Xcode export method for the iOS IPA
        required: true
        default: app-store-connect
        type: choice
        options:
          - app-store-connect
          - ad-hoc
          - development
          - enterprise
      ios_build_number:
        description: Optional iOS CFBundleVersion override
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Read app version
        id: version
        shell: bash
        run: |
          APP_VERSION="$(bun -e 'console.log(JSON.parse(await Bun.file("package.json").text()).version)')"
          echo "app_version=$APP_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Move version tag to current commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.version.outputs.tag_name }}" "${GITHUB_SHA}"
          git push origin "refs/tags/${{ steps.version.outputs.tag_name }}" --force

  build-tauri:
    name: Build ${{ matrix.platform_name }}
    needs: prepare-release
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux
            runner: ubuntu-22.04
            args: --bundles appimage,deb,rpm
          - platform_name: Windows
            runner: windows-latest
            args: --target x86_64-pc-windows-msvc --bundles nsis
          - platform_name: macOS
            runner: macos-latest
            args: --target universal-apple-darwin --bundles dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.runner == 'macos-latest' &&
            'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target # adjust if your Tauri dir differs

      - name: Install Linux system dependencies
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            wget \
            file \
            curl \
            libxdo-dev

      - name: Install frontend dependencies (root)
        run: bun install --frozen-lockfile

      - name: Install frontend dependencies (client)
        run: bun install --frozen-lockfile
        working-directory: client

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare-release.outputs.tag_name }}
          releaseName: QxChat v__VERSION__
          releaseBody: |
            Build automatique GitHub Actions pour la version __VERSION__.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}
          tauriScript: bunx tauri

  build-android:
    name: Build Android APK
    needs: prepare-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Configure Android signing
        shell: bash
        run: |
          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ]; then
            echo "::error::Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD and ANDROID_KEY_ALIAS."
            exit 1
          fi

          keystore_path="$RUNNER_TEMP/lqxp-release-key.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          {
            echo "ANDROID_KEYSTORE_PATH=$keystore_path"
            echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
            echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
            echo "ANDROID_KEY_PASSWORD=${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
          } >> "$GITHUB_ENV"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android APK
        shell: bash
        run: |
          # shellcheck disable=SC2016
          nix develop --command bash -lc '
            set -euo pipefail
            bun install --no-save
            (cd client && bun install --no-save)
            rustup toolchain install "${RUSTUP_TOOLCHAIN:-stable}" --profile minimal
            rustup target add --toolchain "${RUSTUP_TOOLCHAIN:-stable}" $TAURI_ANDROID_RUST_TARGETS
            mkdir -p src-tauri/gen/android/app/src/main/res
            cp -R src-tauri/icons/android/. src-tauri/gen/android/app/src/main/res/
            bun tauri android build --apk --target aarch64

            apk="$(find src-tauri/gen/android/app/build/outputs/apk -path '*/release/*.apk' -type f | sort | head -n1)"
            if [ -z "$apk" ]; then
              echo "::error::No release APK produced."
              exit 1
            fi
            apksigner="$(find -L "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n1)"
            zipalign="$(find -L "$ANDROID_HOME/build-tools" -type f -name zipalign | sort -V | tail -n1)"
            "$apksigner" verify --verbose --print-certs "$apk"
            "$zipalign" -c -P 16 -v 4 "$apk"
          '

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: qxchat-android
          if-no-files-found: error
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

      - name: Upload Android release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: QxChat v${{ needs.prepare-release.outputs.app_version }}
          body: |
            Build automatique GitHub Actions pour la version ${{ needs.prepare-release.outputs.app_version }}.
          generate_release_notes: true
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk

